name: Voice Review → SMS Card

on:
  workflow_dispatch:
    inputs:
      review_text:
        description: 'Free-form spoken review (from Siri Shortcut dictation)'
        required: true

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Create .env file
        run: |
          mkdir -p .tmp
          cat > .env << 'EOF'
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY=${{ secrets.OMDB_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          IMGUR_CLIENT_ID=${{ secrets.IMGUR_CLIENT_ID }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}
          REVIEW_PHONE_NUMBER=${{ secrets.REVIEW_PHONE_NUMBER }}
          EOF

      - name: Parse voice review with Claude
        run: |
          python << 'PYTHON_SCRIPT'
          import json, os, sys
          sys.path.insert(0, '.')
          from dotenv import load_dotenv
          from tools.parse_voice_review import parse_voice_review
          load_dotenv()
          raw_text = """${{ github.event.inputs.review_text }}"""
          print(f"Parsing: {raw_text[:100]}...")
          try:
              parsed = parse_voice_review(raw_text)
              print(f"Parsed: {parsed['title']}")
              with open('.tmp/parsed_review.json', 'w') as f:
                  json.dump(parsed, f, indent=2)
          except ValueError as e:
              print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          PYTHON_SCRIPT

      - name: Fetch poster and generate card
        run: |
          python << 'PYTHON_SCRIPT'
          import json, sys
          sys.path.insert(0, '.')
          from dotenv import load_dotenv
          from tools.fetch_poster import fetch_poster
          from tools.generate_card import generate_card
          load_dotenv()
          with open('.tmp/parsed_review.json') as f:
              parsed = json.load(f)
          year = str(parsed['year']) if parsed.get('year') else None
          movie = fetch_poster(parsed['title'], year)
          card_path = generate_card({
              'title': parsed['title'],
              'year': movie['year'] or year or '',
              'runtime': movie['runtime'] or '',
              'ratings': parsed['ratings'],
              'sub_genre': parsed['sub_genre'],
              'recommendation': parsed['recommendation'],
              'review_text': parsed['review_text'],
              'poster_path': movie['poster_path'],
          })
          print(f"Card: {card_path}")
          with open('.tmp/card_path.txt', 'w') as f:
              f.write(card_path)
          PYTHON_SCRIPT

      - name: Upload to Imgur and send MMS
        run: |
          python << 'PYTHON_SCRIPT'
          import os, sys
          sys.path.insert(0, '.')
          from dotenv import load_dotenv
          from tools.send_sms import deliver_card
          load_dotenv()
          with open('.tmp/card_path.txt') as f:
              card_path = f.read().strip()
          result = deliver_card(
              card_path=card_path,
              imgur_client_id=os.environ['IMGUR_CLIENT_ID'],
              twilio_account_sid=os.environ['TWILIO_ACCOUNT_SID'],
              twilio_auth_token=os.environ['TWILIO_AUTH_TOKEN'],
              twilio_from_number=os.environ['TWILIO_FROM_NUMBER'],
              review_phone_number=os.environ['REVIEW_PHONE_NUMBER'],
          )
          print(f"Imgur URL: {result['imgur_url']}")
          print(f"Twilio SID: {result['message_sid']}")
          PYTHON_SCRIPT

      - name: Save card as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: review-card
          path: .tmp/card_*.png
          retention-days: 30
